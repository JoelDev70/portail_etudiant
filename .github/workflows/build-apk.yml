name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  # Configuration MySQL pour l'APK
  DB_HOST: ${{ secrets.DB_HOST || 'localhost' }}
  DB_PORT: ${{ secrets.DB_PORT || '4306' }}
  DB_USER: ${{ secrets.DB_USER || 'root' }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD || '' }}
  DB_NAME: ${{ secrets.DB_NAME || 'portail_etudiant' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install gitpython

    - name: Install Flet CLI
      run: pip install flet

    - name: Set up Java JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Build APK with Flet
      env:
        DB_HOST: ${{ secrets.DB_HOST || 'localhost' }}
        DB_PORT: ${{ secrets.DB_PORT || '4306' }}
        DB_USER: ${{ secrets.DB_USER || 'root' }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD || '' }}
        DB_NAME: ${{ secrets.DB_NAME || 'portail_etudiant' }}
      run: |
        flet build apk --output=portail_etudiant.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/portail_etudiant.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: portail-etudiant-apk
        path: dist/portail_etudiant.apk
        retention-days: 30

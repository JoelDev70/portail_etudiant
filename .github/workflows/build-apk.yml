name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  # Configuration MySQL pour l'APK
  DB_HOST: ${{ secrets.DB_HOST || 'localhost' }}
  DB_PORT: ${{ secrets.DB_PORT || '4306' }}
  DB_USER: ${{ secrets.DB_USER || 'root' }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD || '' }}
  DB_NAME: ${{ secrets.DB_NAME || 'portail_etudiant' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ÉTAPE CRUCIALE : Installation de Flutter requis par Flet pour compiler l'APK
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install gitpython flet
        # Flet build génère l'APK dans le dossier ./build/apk ou selon l'output spécifié
    - name: Accept Android Licenses
      run: yes | flutter doctor --android-licenses

    - name: Build APK with Flet
      run: |
        flet build apk --output portail_etudiant.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: portail_etudiant.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: portail-etudiant-apk
        path: portail_etudiant.apk
        retention-days: 30
